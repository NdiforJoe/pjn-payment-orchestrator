name: Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  NODE_VERSION: '20'
  CDK_DEFAULT_ACCOUNT: '373233583934'
  CDK_DEFAULT_REGION: 'us-east-1'

jobs:

  # ── Gate 1: Secret Detection (PCI DSS Req 3.4) ───────────────────────────
  secret-scan:
    name: 'Gate 1 · Secret Detection'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  # ── Gate 2: Dependency Audit (PCI DSS Req 6.3) ───────────────────────────
  dependency-audit:
    name: 'Gate 2 · Dependency Vulnerabilities'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=high --json > compliance-evidence/npm-audit.json || true
      - name: Fail on critical
        run: npm audit --audit-level=critical
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: npm-audit
          path: compliance-evidence/npm-audit.json

  # ── Gate 3: SBOM Generation (PCI DSS Req 6.2) ────────────────────────────
  sbom:
    name: 'Gate 3 · SBOM'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5   # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOM
        run: syft dir:. -o spdx-json > compliance-evidence/sbom.spdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom
          path: compliance-evidence/sbom.spdx.json

  # ── Gate 4: SAST (PCI DSS Req 6.4) ───────────────────────────────────────
  sast:
    name: 'Gate 4 · SAST TypeScript'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Install ESLint plugins
        run: npm install --no-save eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin
      - name: TypeScript type check
        run: |
          npx tsc --noEmit -p src/tsconfig.json
          npx tsc --noEmit -p cdk/tsconfig.json
      - name: ESLint security scan
        run: npx eslint src/ --ext .ts --format json > compliance-evidence/eslint-report.json || true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sast-report
          path: compliance-evidence/eslint-report.json

  # ── Gate 5: IaC Scan — Checkov (PCI DSS Req 2.2) ─────────────────────────
  checkov:
    name: 'Gate 5 · IaC Security — Checkov'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Synth CDK to CloudFormation
        run: cd cdk && CDK_DEFAULT_ACCOUNT=${{ env.CDK_DEFAULT_ACCOUNT }} CDK_DEFAULT_REGION=${{ env.CDK_DEFAULT_REGION }} ../node_modules/.bin/cdk synth --require-approval never 2>/dev/null
      - name: Run Checkov on CloudFormation
        uses: bridgecrewio/checkov-action@master
        with:
          directory: cdk/cdk.out
          framework: cloudformation
          output_format: json
          output_file_path: compliance-evidence/checkov-report.json
          soft_fail: true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: checkov-report
          path: compliance-evidence/checkov-report.json

  # ── Gate 6: OPA Policy Gate (PCI DSS Req 7) ──────────────────────────────
  opa:
    name: 'Gate 6 · OPA Policy Gate'
    runs-on: ubuntu-latest
    needs: checkov
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa && sudo mv opa /usr/local/bin/
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 
        with:
          name: checkov-report
          path: compliance-evidence/
      - name: Evaluate OPA policies
        run: |
          opa eval \
            --data opa-policies/pci_dss.rego \
            --input compliance-evidence/checkov-report.json \
            --format pretty \
            "data.pci.allow" | tee compliance-evidence/opa-result.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: opa-result
          path: compliance-evidence/opa-result.json

  # ── Gate 7: CDK Diff on PR ────────────────────────────────────────────────
  cdk-diff:
    name: 'Gate 7 · CDK Diff'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: CDK Diff
        run: |
          cd cdk && CDK_DEFAULT_ACCOUNT=${{ env.CDK_DEFAULT_ACCOUNT }} CDK_DEFAULT_REGION=${{ env.CDK_DEFAULT_REGION }} \
          ../node_modules/.bin/cdk diff --all 2>&1 | tee ../compliance-evidence/cdk-diff.txt
      - name: Comment diff on PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b 
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('compliance-evidence/cdk-diff.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## CDK Diff\n```\n' + diff.slice(0, 60000) + '\n```'
            });

  # ── Gate 8: CDK Deploy (main only) ───────────────────────────────────────
  deploy:
    name: 'Gate 8 · Deploy to AWS'
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-audit, sbom, sast, checkov, opa]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: CDK Deploy
        run: |
          cd cdk && CDK_DEFAULT_ACCOUNT=${{ env.CDK_DEFAULT_ACCOUNT }} CDK_DEFAULT_REGION=${{ env.CDK_DEFAULT_REGION }} \
          ../node_modules/.bin/cdk deploy --all --require-approval never
